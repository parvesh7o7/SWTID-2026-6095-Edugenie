# Render Blueprint — Auto-configures your web service on Render
services:
  - type: web
    name: edugenie
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # You must set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TRANSFORMERS_CACHE
        value: /opt/render/.cache/huggingface
